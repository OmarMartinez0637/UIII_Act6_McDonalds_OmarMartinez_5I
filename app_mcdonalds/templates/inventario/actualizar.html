{% extends 'base.html' %}
{% block content %}
<h2>Actualizar Insumo del Inventario</h2>
<form method="post" action="{% url 'realizar_actualizacion_inventario' insumo.id_insumo %}">
    {% csrf_token %}
    <div class="mb-3">
        <label for="nombre_insumo" class="form-label">Nombre del Insumo</label>
        <input type="text" name="nombre_insumo" value="{{ insumo.nombre_insumo }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="cantidad" class="form-label">Cantidad</label>
        <input type="number" name="cantidad" value="{{ insumo.cantidad }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="unidad" class="form-label">Unidad</label>
        <input type="text" name="unidad" value="{{ insumo.unidad }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="id_proveedor" class="form-label">Proveedor</label>
        <select name="id_proveedor" id="id_proveedor" class="form-control" required>
            {% for proveedor in proveedores %}
            <option value="{{ proveedor.id_proveedor }}" {% if proveedor.id_proveedor == insumo.id_proveedor.id_proveedor %}selected{% endif %}>{{ proveedor.nombre }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="fecha_entrega" class="form-label">Fecha de Entrega</label>
        <input type="datetime-local" name="fecha_entrega" value="{{ insumo.fecha_entrega|date:'Y-m-d\TH:i' }}" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Actualizar</button>
</form>
{% endblock %}
