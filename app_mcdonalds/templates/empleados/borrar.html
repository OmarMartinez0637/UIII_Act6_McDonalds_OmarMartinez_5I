{% extends 'base.html' %}
{% block content %}
<h2>Borrar Empleado</h2>
<p>¿Estás seguro de que quieres borrar a {{ empleado.nombre }} {{ empleado.apellido }}?</p>
<form method="post" class="bg-light p-4 rounded">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Borrar</button>
    <a href="{% url 'ver_empleados' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
