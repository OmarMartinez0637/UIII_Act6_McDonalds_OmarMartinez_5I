{% extends 'base.html' %}
{% block content %}
<h2>Actualizar Proveedor</h2>
<form method="post" action="{% url 'realizar_actualizacion_proveedores' proveedor.id_proveedor %}">
    {% csrf_token %}
    <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" name="nombre" value="{{ proveedor.nombre }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="telefono" class="form-label">Teléfono</label>
        <input type="text" name="telefono" value="{{ proveedor.telefono }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" value="{{ proveedor.email }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="direccion" class="form-label">Dirección</label>
        <textarea name="direccion" class="form-control" required>{{ proveedor.direccion }}</textarea>
    </div>
    <div class="mb-3">
        <label for="producto_suministrado" class="form-label">Producto Suministrado</label>
        <input type="text" name="producto_suministrado" value="{{ proveedor.producto_suministrado }}" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Actualizar</button>
</form>
{% endblock %}
