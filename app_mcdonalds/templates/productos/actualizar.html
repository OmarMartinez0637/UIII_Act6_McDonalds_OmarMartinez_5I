{% extends 'base.html' %}
{% block content %}
<h2>Actualizar Producto</h2>
<form method="post" action="{% url 'realizar_actualizacion_productos' producto.id_producto %}">
    {% csrf_token %}
    <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" name="nombre" value="{{ producto.nombre }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="categoria" class="form-label">Categoría</label>
        <input type="text" name="categoria" value="{{ producto.categoria }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="precio" class="form-label">Precio</label>
        <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="stock" class="form-label">Stock</label>
        <input type="number" name="stock" value="{{ producto.stock }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="descripcion" class="form-label">Descripción</label>
        <textarea name="descripcion" class="form-control" required>{{ producto.descripcion }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Actualizar</button>
</form>
{% endblock %}
