{% extends 'base.html' %}
{% block content %}
<h2>Agregar Pedido</h2>
<form method="post" class="bg-light p-4 rounded">
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_cliente" class="form-label">Cliente</label>
        <select name="id_cliente" id="id_cliente" class="form-control" required>
            {% for cliente in clientes %}
            <option value="{{ cliente.id_cliente }}">{{ cliente.nombre }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="id_empleado" class="form-label">Empleado</label>
        <select name="id_empleado" id="id_empleado" class="form-control" required>
            {% for empleado in empleados %}
            <option value="{{ empleado.id_empleado }}">{{ empleado.nombre }} {{ empleado.apellido }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="fecha" class="form-label">Fecha</label>
        <input type="datetime-local" name="fecha" id="fecha" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="metodo_pago" class="form-label">Método de Pago</label>
        <input type="text" name="metodo_pago" id="metodo_pago" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="total" class="form-label">Total</label>
        <input type="number" step="0.01" name="total" id="total" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Agregar</button>
</form>
{% endblock %}
