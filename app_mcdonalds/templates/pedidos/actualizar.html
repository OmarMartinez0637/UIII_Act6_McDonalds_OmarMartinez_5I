{% extends 'base.html' %}
{% block content %}
<h2>Actualizar Pedido</h2>

<form method="post" action="{% url 'realizar_actualizacion_pedidos' pedido.id_pedido %}">
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_cliente" class="form-label">Cliente</label>
        <select name="id_cliente" id="id_cliente" class="form-control" required>
            {% for cliente in clientes %}
            <option value="{{ cliente.id_cliente }}" {% if cliente.id_cliente == pedido.id_cliente.id_cliente %}selected{% endif %}>{{ cliente.nombre }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="id_empleado" class="form-label">Empleado</label>
        <select name="id_empleado" id="id_empleado" class="form-control" required>
            {% for empleado in empleados %}
            <option value="{{ empleado.id_empleado }}" {% if empleado.id_empleado == pedido.id_empleado.id_empleado %}selected{% endif %}>{{ empleado.nombre }} {{ empleado.apellido }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="fecha" class="form-label">Fecha</label>
        <input type="datetime-local" name="fecha" value="{{ pedido.fecha|date:'Y-m-d\TH:i' }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="metodo_pago" class="form-label">Método de Pago</label>
        <input type="text" name="metodo_pago" value="{{ pedido.metodo_pago }}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label for="total" class="form-label">Total</label>
        <input type="number" step="0.01" name="total" value="{{ pedido.total }}" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Actualizar</button>
</form>
{% endblock %}
